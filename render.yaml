# Render blueprint — deploys the Prism backend as a free web service.
# DEMO_MODE serves the bundled pre-analyzed tickers instantly and forever,
# and allows ANALYSIS_DAILY_BUDGET fresh analyses per day (using the host's
# GEMINI/FRED keys) before politely declining until the next day.
services:
  - type: web
    name: prism-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: ANALYSIS_DAILY_BUDGET
        value: "3"
      - key: GEMINI_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.6"
